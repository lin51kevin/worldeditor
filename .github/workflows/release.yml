name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release-tauri:
    name: Build Tauri Desktop App
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM
        run: wasm-pack build crates/we-wasm --target web --out-dir ../../frontend/wasm/pkg --release

      - name: Install yarn
        run: npm install -g yarn@1

      - name: Install frontend dependencies
        run: cd frontend && yarn install --frozen-lockfile

      # tauri-action builds the signed bundles, generates the updater `.sig`
      # signatures and the `latest.json` manifest, and uploads everything to the
      # GitHub Release for the pushed tag. The auto-update endpoint configured in
      # tauri.conf.json points at `releases/latest/download/latest.json`.
      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'WorldEditor v__VERSION__'
          releaseBody: 'Desktop builds support in-app auto-update. Download an installer below to get started.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}