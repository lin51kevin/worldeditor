name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release-tauri:
    name: Build Tauri Desktop App
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          # - platform: macos-latest
          #   target: aarch64-apple-darwin
          # - platform: macos-13
          #   target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            pkg-config \
            libdbus-1-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-keysyms1-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-util-dev \
            libxcb-xkb-dev \
            libxkbcommon-x11-dev \
            libxkbcommon-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM
        run: wasm-pack build crates/we-wasm --target web --out-dir ../../frontend/wasm/pkg --release

      - name: Install yarn
        run: npm install -g yarn@1

      - name: Install frontend dependencies
        run: cd frontend && yarn install --frozen-lockfile

      # tauri-action builds the signed bundles, generates the updater `.sig`
      # signatures and the `latest.json` manifest, and uploads everything to the
      # GitHub Release for the pushed tag. The auto-update endpoint configured in
      # tauri.conf.json points at `releases/latest/download/latest.json`.
      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'WorldEditor v__VERSION__'
          releaseBody: 'Desktop builds support in-app auto-update. Download an installer below to get started.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}