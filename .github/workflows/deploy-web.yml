name: Deploy Web

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  deploy-web:
    name: Deploy Web to GitHub Pages
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install yarn
        run: corepack enable && corepack prepare yarn@stable --activate

      - name: Install dependencies
        run: cd frontend && yarn install --immutable

      - name: Install Rust toolchain for WASM
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM package
        run: wasm-pack build crates/we-wasm --target web --release

      - name: Copy WASM to frontend
        run: |
          mkdir -p frontend/wasm/pkg
          cp -r crates/we-wasm/pkg/* frontend/wasm/pkg/

      - name: Build Web
        run: cd frontend && yarn build:web

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4