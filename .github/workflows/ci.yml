name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Stage 1: Build
  build-rust:
    name: Build Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo install wasm-pack wasm-opt
      - run: wasm-pack build crates/we-wasm --target web --release
      - name: Optimize WASM
        run: find crates/we-wasm/target -name "*.wasm" -exec wasm-opt -Oz -o {} {} \;

  # Compile-check WASM target without running tests (strict gate)
  wasm-compile-check:
    name: WASM Compile Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --target wasm32-unknown-unknown -p we-wasm

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install yarn
        run: corepack enable && corepack prepare yarn@stable --activate
      - name: Install dependencies
        run: cd frontend && yarn install --immutable
      - name: Type check
        run: cd frontend && yarn typecheck
      - name: Build
        run: cd frontend && yarn build

  # Stage 2: Unit Tests
  test-rust:
    name: Test Rust
    runs-on: ubuntu-22.04
    needs: build-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: true
      - name: Install system dependencies
        run: sudo apt update && sudo apt install -y pkg-config libdbus-1-dev libx11-dev libxcb1-dev libxcb-shm0-dev libxcb-xfixes0-dev libxcb-render0-dev libxcb-shape0-dev libxcb-keysyms1-dev libxcb-icccm4-dev libxcb-image0-dev libxcb-util-dev libxcb-xkb-dev libxkbcommon-x11-dev libxkbcommon-dev
      - name: Install coverage tools
        run: cargo install cargo-llvm-cov --locked
      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Check coverage thresholds per crate
        run: |
          # Check we-core coverage ≥ 80%
          cargo llvm-cov --package we-core --summary-only --fail-under-lines 80
          # Check we-render coverage ≥ 60%
          cargo llvm-cov --package we-render --summary-only --fail-under-lines 60
          # Check we-service coverage ≥ 75%
          cargo llvm-cov --package we-service --summary-only --fail-under-lines 75
          # Optional: report overall coverage
          echo "All coverage thresholds passed!"
      - name: Generate coverage report
        run: cargo llvm-cov report --workspace

  test-wasm:
    name: Test WASM
    runs-on: ubuntu-22.04
    needs: [build-wasm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo install wasm-pack
      - name: Test we-core (WASM)
        run: wasm-pack test --headless --chrome crates/we-core
        continue-on-error: true  # Phase 0: wasm-pack headless Chrome is flaky in CI
      - name: Test we-wasm
        run: wasm-pack test --headless --chrome crates/we-wasm
        continue-on-error: true  # Phase 0: wasm-pack headless Chrome is flaky in CI

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-22.04
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install yarn
        run: corepack enable && corepack prepare yarn@stable --activate
      - name: Install dependencies
        run: cd frontend && yarn install --immutable
      - name: Run tests
        run: cd frontend && yarn test
      - name: Run coverage
        run: cd frontend && yarn test:coverage

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock
      - run: cd frontend && yarn install --frozen-lockfile
      - run: cd frontend && yarn playwright install chromium
      - run: cd frontend && yarn test:e2e

  # Stage 3: Quality Gates
  quality:
    name: Quality Gates
    runs-on: ubuntu-22.04
    needs: [test-rust, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: true
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Security audit
        run: cargo install cargo-audit --locked && cargo audit
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install yarn
        run: corepack enable && corepack prepare yarn@stable --activate
      - name: Install frontend dependencies
        run: cd frontend && yarn install --immutable
      - name: Frontend lint
        run: cd frontend && yarn lint
      - name: Frontend typecheck
        run: cd frontend && yarn typecheck
