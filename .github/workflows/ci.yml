name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Stage 1: Build
  build-rust:
    name: Build Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system dependencies (Tauri + X11)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            libx11-dev \
            libxcb1-dev libxcb-shm0-dev libxcb-xfixes0-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-keysyms1-dev \
            libxcb-icccm4-dev libxcb-image0-dev libxcb-util-dev \
            libxcb-xkb-dev libxkbcommon-x11-dev libxkbcommon-dev
      - run: cargo build --workspace

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo install wasm-pack
      - run: wasm-pack build crates/we-wasm --target web --out-dir ../../frontend/wasm/pkg --release
      - name: Upload WASM pkg
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: frontend/wasm/pkg/

  # Compile-check WASM target without running tests (strict gate)
  wasm-compile-check:
    name: WASM Compile Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --target wasm32-unknown-unknown -p we-wasm

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-22.04
    needs: [build-wasm]
    steps:
      - uses: actions/checkout@v4
      - name: Download WASM pkg
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: frontend/wasm/pkg/
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install -g yarn@1 && cd frontend && yarn install --frozen-lockfile
      - name: Type check
        run: cd frontend && yarn typecheck
      - name: Build
        run: cd frontend && yarn build

  # Stage 1.5: Lint & Format (strict gate)
  lint:
    name: Lint & Format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            libx11-dev \
            libxcb1-dev libxcb-shm0-dev libxcb-xfixes0-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-keysyms1-dev \
            libxcb-icccm4-dev libxcb-image0-dev libxcb-util-dev \
            libxcb-xkb-dev libxkbcommon-x11-dev libxkbcommon-dev
      - name: Rustfmt check
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install frontend dependencies
        run: npm install -g yarn@1 && cd frontend && yarn install --frozen-lockfile
      - name: ESLint
        run: cd frontend && yarn lint

  # Stage 2: Unit Tests
  test-rust:
    name: Test Rust
    runs-on: ${{ matrix.os }}
    needs: build-rust
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]
        include:
          - os: ubuntu-22.04
            run_coverage: true
          - os: windows-latest
            run_coverage: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: true
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            libx11-dev \
            libxcb1-dev libxcb-shm0-dev libxcb-xfixes0-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-keysyms1-dev \
            libxcb-icccm4-dev libxcb-image0-dev libxcb-util-dev \
            libxcb-xkb-dev libxkbcommon-x11-dev libxkbcommon-dev
      - name: Run tests
        run: cargo test --workspace
      - name: Install coverage tools
        if: matrix.run_coverage
        run: cargo install cargo-llvm-cov --locked
      - name: Run tests with coverage
        if: matrix.run_coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Check coverage thresholds per crate
        if: matrix.run_coverage
        run: |
          # Check we-core coverage ≥ 80%
          cargo llvm-cov --package we-core --summary-only --fail-under-lines 80
          # Check we-render coverage ≥ 60%
          cargo llvm-cov --package we-render --summary-only --fail-under-lines 60
          # Check we-service coverage ≥ 75%
          cargo llvm-cov --package we-service --summary-only --fail-under-lines 75
          # Optional: report overall coverage
          echo "All coverage thresholds passed!"
      - name: Generate coverage report
        if: matrix.run_coverage
        run: cargo llvm-cov report

  test-wasm:
    name: Test WASM
    runs-on: ubuntu-22.04
    needs: [build-wasm]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo install wasm-pack
      - name: Test we-core (WASM)
        run: wasm-pack test --headless --chrome crates/we-core
        continue-on-error: true  # Phase 0: wasm-pack headless Chrome is flaky in CI
      - name: Test we-wasm
        run: wasm-pack test --headless --chrome crates/we-wasm
        continue-on-error: true  # Phase 0: wasm-pack headless Chrome is flaky in CI

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-22.04
    needs: [build-wasm, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Download WASM pkg
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: frontend/wasm/pkg/
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install -g yarn@1 && cd frontend && yarn install --frozen-lockfile
      - name: Run tests
        run: cd frontend && yarn test
      - name: Run coverage
        run: cd frontend && yarn test:coverage

  # Stage 3: End-to-end (functional gate) + visual regression (artifact)
  e2e-functional:
    name: E2E Functional
    runs-on: ubuntu-22.04
    needs: [build-wasm, build-frontend]
    env:
      E2E_FUNCTIONAL_ONLY: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Download WASM pkg
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: frontend/wasm/pkg/
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install -g yarn@1 && cd frontend && yarn install --frozen-lockfile
      - name: Install Playwright browser
        run: cd frontend && npx playwright install --with-deps chromium
      - name: Run functional E2E specs (blocking)
        run: cd frontend && yarn test:e2e:func
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-functional
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  e2e-visual:
    name: E2E Visual Regression
    runs-on: ubuntu-22.04
    needs: [build-wasm, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Download WASM pkg
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: frontend/wasm/pkg/
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install -g yarn@1 && cd frontend && yarn install --frozen-lockfile
      - name: Install Playwright browser
        run: cd frontend && npx playwright install --with-deps chromium
      # Visual baselines are platform-specific and must be generated on this
      # CI runner (Ubuntu + SwiftShader). Until CI-generated baselines under
      # frontend/e2e/__snapshots__/ are committed, this job is non-blocking and
      # publishes the generated/diffed snapshots as an artifact for review.
      # To promote to a blocking gate: download the artifact, commit the
      # baselines, then remove `continue-on-error` below.
      - name: Run visual regression specs
        id: visual
        continue-on-error: true
        run: cd frontend && yarn test:visual --update-snapshots
      - name: Upload visual snapshots & report
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-snapshots
          path: |
            frontend/e2e/__snapshots__/
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 14
      - name: Flag visual job status
        if: steps.visual.outcome != 'success'
        run: echo "::warning::Visual regression non-blocking — review the 'visual-regression-snapshots' artifact and commit CI baselines to enable the gate."
