version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: worldeditor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server:
    build:
      context: .
      dockerfile: crates/we-server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/worldeditor
      JWT_SECRET: your-secret-change-in-production
      RUST_LOG: info
    depends_on:
      - db
      - redis
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data: