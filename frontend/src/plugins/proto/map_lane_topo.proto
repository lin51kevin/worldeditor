message LaneHeader{
  string id = 1;
  double length = 2;

  enum LaneType {
    none = 0;
    driving = 1;
    stop = 2;
    shoulder = 3;
    biking = 4;
    sidewalk=5;
    border=6;
    restricted =7;
    parking = 8;
    bidirectional = 9;
    median = 10;
    special1 = 11;
    special2 = 12;
    special3 = 13;
    roadWorks = 14;
    tram =15;
    rail =16;
    entry =17;
    exit =18;
    offRamp=19;
    onRamp=20;
    mwyEntry =21;
    mwyExit=22;
  };

  enum LaneTurn {
    NO_TURN = 0;
    LEFT_TURN = 1;
    RIGHT_TURN = 2;
    U_TURN = 3;
  };
  enum SpeedUnit{
    mpS = 0;
    mph = 1;
    kmph = 2;
  }
  enum LaneVirtualType{
    NO_VIRTUAL = 0;
    CENTER_LINE = 1;
  }
  LaneType lane_type = 3;
  LaneTurn lane_Turn = 4;
  double speed_limit = 5;
  SpeedUnit speed_unit = 6;
  LaneVirtualType virtual_type = 7;
  string name = 8;
}
message LaneLink{
  string id = 1;
}

message LaneTopo{
  LaneHeader  header = 1;
  repeated LaneLink predecessors = 2;
  repeated LaneLink successors = 3;
  repeated LaneLink left_neighbors = 4;
  repeated LaneLink right_neighbors = 5;
}

