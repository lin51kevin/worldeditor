message RoadHeader {

  enum RoadType {
    unknown = 0;
    rural = 1;
    motorway = 2;
    town = 3;
    lowSpeed = 4;
    pedestrian = 5;
    bicycle = 6;
    rail = 7;
  };

  enum SpeedUnit{
    mpS = 0;
    mph = 1;
    kmph = 2;
  }
  string id = 1;
  double length = 2;
  string name = 3;
  string junction_id = 4;
  double speed_limit = 5;
  SpeedUnit speed_unit = 6;
  RoadType road_type = 7;
}

message Roadlink {
  enum RoadLinkDir {
    positive = 0;
    negative = 1;
  };
  enum RoadLinkType {
    road = 0;
    junction = 1;
  };
  enum RoadLinkContactPoint {
    start = 0;
    end = 1;
  };
  string id = 1;
  double s = 2;
  RoadLinkDir link_dir = 3;
  RoadLinkType link_type = 4;
  RoadLinkContactPoint link_contact_point = 5;
}

message RoadSection{
  enum Type {
    UNKNOWN = 0;
    LEFT_SECTION = 1;
    RIGHT_SECTION = 2;
  };
  string section_id = 1;
  uint32 section_index = 2;
  double s = 3;
  double length = 4;
  Type  section_direction_type = 5;
  repeated LaneTopo lanes = 6;
}

message RoadTopo {
  RoadHeader header = 1;
  repeated Roadlink road_predecessors = 2;
  repeated Roadlink road_successors = 3;
  repeated RoadSection road_sections = 4;
  repeated rt.hdmap.Object road_objects = 5;
  repeated rt.hdmap.ParkingSpace road_parking_space = 6;
  repeated rt.hdmap.Signal road_signal = 7;
  repeated rt.hdmap.SignalReference road_signal_reference = 8;
  repeated rt.hdmap.ObjectReference road_object_reference = 9;
  
}







